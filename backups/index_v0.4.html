<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트렌드 TOP 10</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background-color: #f4f5f7;
    color: #222;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* 상단 제목 영역 */
  header {
    background-color: #2f54eb;
    color: #fff;
    padding: 28px 16px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 6px;
    font-size: 28px;
  }

  header p {
    margin: 0;
    font-size: 14px;
    opacity: 0.85;
  }

  #baseDate {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.9;
  }

  /* 공통 섹션 카드 */
  section {
    background-color: #fff;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
  }

  section h2 {
    margin-top: 0;
    font-size: 18px;
    border-left: 4px solid #2f54eb;
    padding-left: 10px;
  }

  /* 오늘의 트렌드 요약 */
  .summary-cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .summary-card {
    flex: 1;
    min-width: 160px;
    background-color: #f0f3ff;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }

  .summary-card .label {
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }

  .summary-card .value {
    font-size: 18px;
    font-weight: bold;
    color: #2f54eb;
  }

  /* 카테고리 선택 버튼 */
  .category-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .category-buttons button {
    border: 1px solid #d9d9d9;
    background-color: #fff;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }

  .category-buttons button.active {
    background-color: #2f54eb;
    color: #fff;
    border-color: #2f54eb;
  }

  /* 순위 표 영역 */
  .rank-tables {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .rank-tables > section {
    flex: 1;
    min-width: 320px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }

  th {
    color: #888;
    font-weight: normal;
    font-size: 13px;
  }

  td.rank {
    font-weight: bold;
    color: #2f54eb;
    width: 30px;
  }

  td.category-tag {
    color: #888;
    font-size: 12px;
  }

  .change {
    font-size: 12px;
  }

  .change.up { color: #e64340; }
  .change.down { color: #4a6ee0; }
  .change.same { color: #999; }
  .change.new { color: #fff; background-color: #ff7a45; padding: 2px 6px; border-radius: 4px; }

  /* 1~3위 강조 (1위가 가장 강하게, 2~3위는 약하게) */
  .top-rank-1 {
    background-color: #fff3cd;
  }

  .top-rank-1 td {
    font-weight: bold;
  }

  .top-rank-2 {
    background-color: #f2f2f2;
  }

  .top-rank-3 {
    background-color: #f7ece1;
  }

  /* 안내 문구 (예시 데이터 배너) */
  .example-banner {
    background-color: #fff7e6;
    border: 1px solid #ffd591;
    color: #874d00;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    padding: 10px 16px;
    margin: 16px 16px 0;
    border-radius: 8px;
  }

  /* 모바일 화면 대응 */
  @media (max-width: 700px) {
    .rank-tables > section {
      min-width: 100%;
    }
  }
</style>
</head>
<body>

<header>
  <h1>트렌드 TOP 10</h1>
  <p>지금 가장 많이 사고, 가장 많이 검색하는 것들을 한눈에</p>
  <div id="baseDate"></div>
</header>

<p class="example-banner">
  ℹ️ 본 페이지의 데이터는 실제 네이버 데이터가 아닌 예시(샘플) 데이터입니다. 구조와 디자인 확인을 위한 데모용 화면이며, 실제 순위와 무관합니다.
</p>

<div class="container">

  <!-- 오늘의 트렌드 요약 -->
  <section>
    <h2>오늘의 트렌드 요약</h2>
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">가장 핫한 카테고리</div>
        <div class="value" id="summaryHotCategory"></div>
      </div>
      <div class="summary-card">
        <div class="label">급상승 키워드</div>
        <div class="value" id="summaryTopKeyword"></div>
      </div>
      <div class="summary-card">
        <div class="label">신규 진입 항목</div>
        <div class="value" id="summaryNewCount"></div>
      </div>
    </div>
  </section>

  <!-- 카테고리 선택 버튼 -->
  <section>
    <h2>카테고리 선택</h2>
    <div class="category-buttons" id="categoryButtons"></div>
  </section>

  <!-- 구매 순위 / 검색 순위 표 -->
  <div class="rank-tables">
    <section>
      <h2>구매 순위 TOP 10</h2>
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>항목</th>
            <th>카테고리</th>
            <th>변동</th>
          </tr>
        </thead>
        <tbody id="purchaseTableBody"></tbody>
      </table>
    </section>

    <section>
      <h2>검색 순위 TOP 10</h2>
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>항목</th>
            <th>카테고리</th>
            <th>변동</th>
          </tr>
        </thead>
        <tbody id="searchTableBody"></tbody>
      </table>
    </section>
  </div>

</div>

<script>
  // ---------- 예시 데이터 ----------
  // category: 패션의류 / 뷰티 / 생활용품 / 식품 / 디지털가전 / 스포츠레저
  // change: "+숫자"(순위 상승), "-숫자"(순위 하락), "0"(변동 없음), "new"(신규 진입)

  var purchaseData = [
    { rank: 1,  name: "무선 블루투스 이어폰",     category: "디지털가전", change: "+2" },
    { rank: 2,  name: "썸머 시원 원피스",         category: "패션의류", change: "0" },
    { rank: 3,  name: "저자극 수분 선크림",       category: "뷰티", change: "-1" },
    { rank: 4,  name: "고단백 프로틴바 12입",     category: "식품", change: "+1" },
    { rank: 5,  name: "원터치 캠핑 텐트",         category: "스포츠레저", change: "new" },
    { rank: 6,  name: "쿠션 러닝화",             category: "스포츠레저", change: "-2" },
    { rank: 7,  name: "휴대용 목걸이 선풍기",     category: "생활용품", change: "+3" },
    { rank: 8,  name: "진정 수딩 마스크팩 10매",  category: "뷰티", change: "0" },
    { rank: 9,  name: "제로 칼로리 곤약젤리",     category: "식품", change: "-1" },
    { rank: 10, name: "감성 캠핑 랜턴",           category: "생활용품", change: "new" }
  ];

  var searchData = [
    { rank: 1,  name: "여름 원피스 추천",   category: "패션의류", change: "+1" },
    { rank: 2,  name: "무선 이어폰 추천",   category: "디지털가전", change: "0" },
    { rank: 3,  name: "다이어트 간식 추천", category: "식품", change: "+4" },
    { rank: 4,  name: "캠핑 용품 리스트",   category: "스포츠레저", change: "new" },
    { rank: 5,  name: "선크림 순위",       category: "뷰티", change: "-2" },
    { rank: 6,  name: "런닝화 추천",       category: "스포츠레저", change: "+1" },
    { rank: 7,  name: "여름 휴가 룩 코디",  category: "패션의류", change: "-1" },
    { rank: 8,  name: "캠핑 의자 추천",     category: "생활용품", change: "0" },
    { rank: 9,  name: "미백 세럼 순위",     category: "뷰티", change: "new" },
    { rank: 10, name: "홈트레이닝 용품",    category: "생활용품", change: "-3" }
  ];

  var categories = ["전체", "패션의류", "뷰티", "생활용품", "식품", "디지털가전", "스포츠레저"];
  var selectedCategory = "전체";

  // ---------- 기준 날짜 표시 ----------
  function showBaseDate() {
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth() + 1).padStart(2, "0");
    var d = String(today.getDate()).padStart(2, "0");
    document.getElementById("baseDate").textContent = y + "." + m + "." + d + " 기준";
  }

  // ---------- 변동 표시 뱃지 만들기 ----------
  function buildChangeBadge(change) {
    if (change === "new") {
      return '<span class="change new">NEW</span>';
    }
    if (change.indexOf("+") === 0) {
      return '<span class="change up">▲ ' + change.slice(1) + '</span>';
    }
    if (change.indexOf("-") === 0) {
      return '<span class="change down">▼ ' + change.slice(1) + '</span>';
    }
    return '<span class="change same">- 변동없음</span>';
  }

  // ---------- 표 그리기 ----------
  function renderTable(data, tbodyId) {
    var tbody = document.getElementById(tbodyId);
    tbody.innerHTML = "";

    var filtered = data.filter(function (item) {
      return selectedCategory === "전체" || item.category === selectedCategory;
    });

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">해당 카테고리의 데이터가 없습니다.</td></tr>';
      return;
    }

    filtered.forEach(function (item) {
      var row = document.createElement("tr");

      if (item.rank === 1) {
        row.classList.add("top-rank-1");
      } else if (item.rank === 2) {
        row.classList.add("top-rank-2");
      } else if (item.rank === 3) {
        row.classList.add("top-rank-3");
      }

      row.innerHTML =
        '<td class="rank">' + item.rank + '</td>' +
        '<td>' + item.name + '</td>' +
        '<td class="category-tag">' + item.category + '</td>' +
        '<td>' + buildChangeBadge(item.change) + '</td>';
      tbody.appendChild(row);
    });
  }

  function renderAll() {
    renderTable(purchaseData, "purchaseTableBody");
    renderTable(searchData, "searchTableBody");
  }

  // ---------- 오늘의 트렌드 요약 계산 ----------
  // 항상 전체 데이터를 기준으로 계산한다 (카테고리 버튼의 필터와는 무관).

  function findHotCategory() {
    var allItems = purchaseData.concat(searchData);
    var countByCategory = {};

    allItems.forEach(function (item) {
      if (!countByCategory[item.category]) {
        countByCategory[item.category] = 0;
      }
      countByCategory[item.category] += 1;
    });

    var hotCategory = "-";
    var maxCount = 0;

    categories.forEach(function (category) {
      if (category === "전체") {
        return;
      }
      var count = countByCategory[category] || 0;
      if (count > maxCount) {
        maxCount = count;
        hotCategory = category;
      }
    });

    return hotCategory;
  }

  function findTopRisingKeyword() {
    var topItem = null;
    var topValue = 0;

    searchData.forEach(function (item) {
      if (item.change.indexOf("+") === 0) {
        var value = Number(item.change.slice(1));
        if (value > topValue) {
          topValue = value;
          topItem = item;
        }
      }
    });

    return topItem ? topItem.name : "-";
  }

  function countNewItems() {
    var allItems = purchaseData.concat(searchData);
    var newItems = allItems.filter(function (item) {
      return item.change === "new";
    });
    return newItems.length;
  }

  function renderSummary() {
    document.getElementById("summaryHotCategory").textContent = findHotCategory();
    document.getElementById("summaryTopKeyword").textContent = findTopRisingKeyword();
    document.getElementById("summaryNewCount").textContent = countNewItems() + "개";
  }

  // ---------- 카테고리 버튼 만들기 ----------
  function renderCategoryButtons() {
    var wrap = document.getElementById("categoryButtons");
    wrap.innerHTML = "";

    categories.forEach(function (category) {
      var btn = document.createElement("button");
      btn.textContent = category;
      if (category === selectedCategory) {
        btn.classList.add("active");
      }
      btn.addEventListener("click", function () {
        selectedCategory = category;
        renderCategoryButtons();
        renderAll();
      });
      wrap.appendChild(btn);
    });
  }

  // ---------- 초기 실행 ----------
  showBaseDate();
  renderSummary();
  renderCategoryButtons();
  renderAll();
</script>

</body>
</html>
